<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF6B00",
                        darkBg: "#050505",
                        cardBg: "#0A0A0A",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(255, 107, 0, 0.3)',
                        'glow-hover': '0 0 30px rgba(255, 107, 0, 0.5)',
                        'button-bevel': '0px 4px 0px 0px #CC5500',
                        'button-bevel-active': '0px 2px 0px 0px #CC5500',

                },

        };

<style type="text/tailwindcss">
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        .digital-dust {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 107, 0, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px, 40px 40px;
            animation: drift 60s linear infinite;
        }
        @keyframes drift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 100px 100px, -50px 50px; }
        }
        .hero-pattern {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .role-radio:checked + label {
            border-color: #FF6B00;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.4);
        }
        .role-radio:checked + label .overlay {
            background: linear-gradient(to top, rgba(255, 107, 0, 0.8), rgba(0,0,0,0.2));
        }
        .role-radio:checked + label span {
             color: white;
             text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .tech-input {
            background-color: #000;
            border: 1px solid #333;
            color: #fff;
            transition: all 0.2s ease;
        }
        .tech-input:focus {
            border-color: #FF6B00;
            box-shadow: 0 0 0 1px #FF6B00;
            outline: none;
        }
        .btn-3d {
            transition: all 0.1s;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0px 2px 0px 0px #CC5500;
        }
        .float-slow { animation: float 8s ease-in-out infinite; }
        .float-med { animation: float 6s ease-in-out infinite reverse; }
        .float-fast { animation: float 4s ease-in-out infinite; }
        .mascot-float { animation: mascotFloat 5s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        @keyframes mascotFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .cinematic-glow {
            background: radial-gradient(circle at center, rgba(255, 107, 0, 0.3) 0%, transparent 70%);
        }
    </style>
</head>

</div>

</div>
<div class="relative group h-full">

<span class="font-black text-[10px] uppercase tracking-widest text-neutral-300 block">Sponsor</span>
</div>
</label>
</div>
</div>
</div>
<div class="space-y-3">
<div class="group">
<label class="block text-[10px] font-bold mb-1 ml-1 text-neutral-500 group-focus-within:text-primary transition-colors">FULL NAME</label>
<div class="relative">
<input class="tech-input w-full px-4 py-2 text-sm font-medium rounded-none placeholder-neutral-700" placeholder="ENTER YOUR FULL NAME" type="text"/>

<div class="group">

<input class="tech-input w-full px-4 py-2 text-sm font-medium rounded-none placeholder-neutral-700" placeholder="ENTER YOUR EMAIL" type="email"/>

<div class="group">
<label class="block text-[10px] font-bold mb-1 ml-1 text-neutral-500 group-focus-within:text-primary transition-colors">PASSWORD</label>
<div class="relative">
<input class="tech-input w-full px-4 py-2 text-sm font-medium rounded-none placeholder-neutral-700" placeholder="••••••••••••" type="password"/>
<div class="absolute right-0 top-0 bottom-0 w-1 bg-neutral-800 group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
<div class="group">
<label class="block text-[10px] font-bold mb-1 ml-1 text-neutral-500 group-focus-within:text-primary transition-colors">CONFIRM PASSWORD</label>
<div class="relative">
<input class="tech-input w-full px-4 py-2 text-sm font-medium rounded-none placeholder-neutral-700" placeholder="••••••••••••" type="password"/>
<div class="absolute right-0 top-0 bottom-0 w-1 bg-neutral-800 group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
</div>
<button class="w-full bg-primary btn-3d shadow-button-bevel text-white font-black text-lg tracking-widest py-3 uppercase hover:bg-[#ff7b1a] relative overflow-hidden group mt-2">

<div class="flex justify-center items-center text-[10px] font-bold tracking-wide py-1">
