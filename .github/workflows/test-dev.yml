name: CI — Lint & Type Check

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  typecheck:
    name: TypeScript — Type Check All Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type-check core-gateway
        run: cd apps/core-gateway && npx tsc --noEmit

      - name: Type-check student-portal
        run: cd apps/student-portal && npx tsc --noEmit

      - name: Type-check organizer-dashboard
        run: cd apps/organizer-dashboard && npx tsc --noEmit

      - name: Type-check sponsor-panel
        run: cd apps/sponsor-panel && npx tsc --noEmit

      - name: Type-check landing-page
        run: cd apps/landing-page && npx tsc --noEmit

  build-gateway:
    name: Build — Core Gateway
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Bundle core-gateway with esbuild
        run: |
          npx esbuild apps/core-gateway/src/index.ts \
            --bundle \
            --platform=node \
            --target=node22 \
            --outfile=dist/core-gateway/index.js \
            --external:@prisma/client \
            --external:@prisma/adapter-pg \
            --external:pg

  build-frontends:
    name: Build — Next.js Frontends
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        app: [student-portal, organizer-dashboard, sponsor-panel, landing-page]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        env:
          NX_DAEMON: "false"
        run: npx nx build ${{ matrix.app }}
